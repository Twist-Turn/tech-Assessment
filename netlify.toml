[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  functionsPort = 8889

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback lives in public/_redirects so it only applies to the production
# build — putting "/*" → /index.html here would shadow Vite's /src/* and /@vite/*
# module URLs in `netlify dev`, breaking HMR.
